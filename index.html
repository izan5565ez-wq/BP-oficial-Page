<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>😈</title>

<style>
body {
    margin:0;
    background:black;
    color:red;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}
h1 { font-size:6vw; }
</style>
</head>

<body>

<h1 id="txt"></h1>

<script>
function iniciar() {
    let mensajes = [
        "💀 TE HA HACKEADO PXTERR 💀",
        "⚠️ ERROR CRÍTICO ⚠️",
        "💻 ACCESO DENEGADO 💻",
        "😈 SISTEMA COMPROMETIDO 😈"
    ];

    let i = 0;

    let loop = setInterval(() => {
        document.getElementById("txt").textContent = mensajes[i];
        i = (i + 1) % mensajes.length;
    }, 100);

    // 🔥 “reinicio” cada 1 segundo
    setTimeout(() => {
        clearInterval(loop);
        document.body.innerHTML = '<h1 id="txt"></h1>';
        iniciar(); // vuelve a empezar TODO
    }, 1000);
}

iniciar();

// fullscreen
document.onclick = () => {
    document.documentElement.requestFullscreen();
};
</script>

</body>
</html>
